name: Sync match results

on:
  # GitHub Actions enforces a 5-minute minimum cron interval and runs are
  # best-effort (often delayed several minutes), so */5 is the practical floor.
  schedule:
    # WC 2026 match windows (all times UTC):
    #   Window A — 12:00–01:00 UTC: daytime/evening kickoffs
    #   Window B — 03:00–05:00 UTC: midnight Argentina kickoffs
    - cron: "*/5 12-23 * * *"   # Window A part 1: 12:00–23:59 UTC
    - cron: "*/5 0-1 * * *"     # Window A part 2: 00:00–01:59 UTC
    - cron: "*/5 3-5 * * *"     # Window B:        03:00–05:59 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call sync endpoint
        run: |
          RESPONSE=$(curl -s -o /tmp/sync-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync-matches")

          echo "HTTP status: $RESPONSE"
          cat /tmp/sync-response.json

          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "207" ]; then
            echo "Sync failed with status $RESPONSE"
            exit 1
          fi

      # Fail the job (which emails the workflow owner) when our computed
      # round-of-32 disagrees with the official bracket published by ESPN.
      # The sync above already persisted results server-side, so failing here
      # never rolls anything back — it only raises the alert. A third-place
      # divergence means FIFA's best-thirds tiebreakers resolved differently
      # than we computed: correct the seed by hand. A deterministic-slot
      # divergence means a bug. Note: this re-fires every cron tick until the
      # drift is resolved, so expect repeated emails within a match window.
      - name: Check round-of-32 against official bracket
        if: success()
        run: |
          DRIFT=$(jq '(.reconcile.divergences // []) | length' /tmp/sync-response.json)
          if [ "$DRIFT" != "0" ]; then
            echo "::error::Round-of-32 drift on ${DRIFT} slot(s): computed bracket disagrees with the official bracket."
            jq -r '.reconcile.divergences[] | "  \(.stage) [\(if .thirdPlaceSlot then "third-place tiebreaker — correct the seed" else "DETERMINISTIC SLOT — investigate bug" end)]: computed \(.expected | join(" v ")), official \(.actual | join(" v "))"' /tmp/sync-response.json
            exit 1
          fi
          echo "No round-of-32 drift."
