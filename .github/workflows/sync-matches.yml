name: Sync match results

on:
  schedule:
  # Schedules are 3 times a day, every 30 minutes during the following time windows:
  # 19:00–20:59 ART
  - cron: "*/30 22-23 * * *"

  # 00:00–01:59 ART
  - cron: "*/30 3-4 * * *"

  # 04:00–05:59 ART
  - cron: "*/30 7-8 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call sync endpoint
        run: |
          RESPONSE=$(curl -s -o /tmp/sync-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync-matches")

          echo "HTTP status: $RESPONSE"
          cat /tmp/sync-response.json

          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "207" ]; then
            echo "Sync failed with status $RESPONSE"
            exit 1
          fi
